<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johnson Engineering App</title>
  <style>
    :root {
      --color-primary: #1E3A8A;
      --color-secondary: #10B981;
      --color-accent: #F97316;
      --color-highlight: #FACC15;
      --color-ink: #333333;
      --color-bg: #FEFCF6;
      --color-card: #FFFFFF;
      --color-border: #E5E7EB;
      --color-primary-soft: #EFF6FF;
      --color-secondary-soft: #ECFDF5;
      --color-highlight-soft: #FFFBEB;
      --color-accent-soft: #FFF7ED;
      --blue: var(--color-primary);
      --yellow: var(--color-highlight);
      --red: var(--color-accent);
      --green: var(--color-secondary);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-bg); color: var(--color-ink); font-family: "Noto Sans SC", "PingFang SC", sans-serif; }
    .app-header { position: sticky; top: 0; z-index: 10; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; background: rgba(254,252,246,.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--color-border); }
    .brand { display: flex; align-items: center; gap: 10px; color: var(--color-primary); font-weight: 900; }
    .brand img { width: 38px; height: 38px; border-radius: 50%; }
    .app-shell { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 64px); }
    .sidebar { padding: 22px; border-right: 1px solid var(--color-border); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 14px; margin-bottom: 8px; color: var(--color-ink); text-decoration: none; font-weight: 700; }
    .nav-item.active { color: var(--color-primary); background: var(--color-primary-soft); }
    .main { padding: 28px; }
    .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 22px; }
    .card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: 20px; padding: 22px; }
    .status-ok { color: var(--color-secondary); background: var(--color-secondary-soft); }
    .status-warn { color: var(--color-accent); background: var(--color-accent-soft); }
    .pill { display: inline-flex; border-radius: 999px; padding: 4px 10px; font-size: .78rem; font-weight: 800; }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-accent { background: var(--color-highlight); color: var(--color-primary); }
    .btn-warning { background: var(--color-accent); color: white; }
    @media (max-width: 820px) { .app-shell { grid-template-columns: 1fr; } .sidebar { border-right: 0; border-bottom: 1px solid var(--color-border); } .dashboard { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand"><img src="avatar-circle-64.png" alt="Johnson Avatar"> Johnson Engineering Tool</div>
    <span class="pill status-ok">AI Assisted</span>
  </header>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="nav-item active" href="#">FEA Setup</a>
      <a class="nav-item" href="#">Fatigue</a>
      <a class="nav-item" href="#">Vibration</a>
      <a class="nav-item" href="#">Durability</a>
    </aside>
    <main class="main">
      <h1>工程分析仪表盘</h1>
      <section class="dashboard">
        <article class="card"><span class="pill status-ok">通过</span><h2>模型校核</h2><p>网格、载荷和边界条件已完成初步检查。</p></article>
        <article class="card"><span class="pill status-warn">风险</span><h2>疲劳热点</h2><p>局部应力集中需要进一步细化评估。</p></article>
        <article class="card"><span class="pill status-ok">建议</span><h2>下一步</h2><p>生成报告并同步关键结论。</p></article>
      </section>
    </main>
  </div>
</body>
</html>
