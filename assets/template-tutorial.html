<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johnson Engineering Tutorial</title>
  <style>
    :root {
      --color-primary: #1E3A8A;
      --color-secondary: #10B981;
      --color-accent: #F97316;
      --color-highlight: #FACC15;
      --color-ink: #333333;
      --color-bg: #FEFCF6;
      --color-card: #FFFFFF;
      --color-border: #E5E7EB;
      --color-primary-soft: #EFF6FF;
      --color-secondary-soft: #ECFDF5;
      --color-highlight-soft: #FFFBEB;
      --color-accent-soft: #FFF7ED;
      --blue: var(--color-primary);
      --yellow: var(--color-highlight);
      --red: var(--color-accent);
      --green: var(--color-secondary);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-bg); color: var(--color-ink); font-family: "Noto Sans SC", "PingFang SC", sans-serif; line-height: 1.75; }
    .container { width: min(980px, calc(100% - 40px)); margin: 0 auto; }
    .hero { display: grid; grid-template-columns: 1fr 260px; align-items: center; gap: 32px; padding: 72px 0 48px; border-bottom: 2px dashed rgba(30,58,138,.18); }
    h1 { color: var(--color-primary); font-size: clamp(2.4rem, 6vw, 4.8rem); line-height: 1.05; }
    .lead { margin-top: 18px; font-size: 1.15rem; }
    .hero img { width: 100%; filter: drop-shadow(0 14px 28px rgba(30,58,138,.12)); }
    .step { display: grid; grid-template-columns: 72px 1fr; gap: 22px; padding: 38px 0; }
    .step-num { width: 56px; height: 56px; border-radius: 50%; background: var(--color-primary); color: white; display: grid; place-items: center; font-weight: 900; }
    .card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: 20px; padding: 24px; }
    .note { background: var(--color-highlight-soft); border: 2px solid var(--color-highlight); border-radius: 20px; padding: 22px; margin-top: 18px; }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-accent { background: var(--color-highlight); color: var(--color-primary); }
    .btn-warning { background: var(--color-accent); color: white; }
    .tag-fea { color: var(--color-primary); background: var(--color-primary-soft); }
    .tag-fatigue { color: var(--color-accent); background: var(--color-accent-soft); }
    .tag-vibration { color: var(--color-primary); background: var(--color-primary-soft); }
    .tag-durability { color: var(--color-secondary); background: var(--color-secondary-soft); }
    .tag-code { color: var(--color-primary); background: #F8FAFC; }
    .tag-ai { color: var(--color-secondary); background: var(--color-secondary-soft); }
    @media (max-width: 760px) { .hero, .step { grid-template-columns: 1fr; } .hero img { max-width: 220px; } }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div>
        <h1>工程分析教程标题</h1>
        <p class="lead">用清晰步骤解释工程问题、分析方法、结果判断和风险校核。</p>
      </div>
      <img src="character-half.png" alt="Johnson Engineering Character">
    </section>
    <section class="step">
      <div class="step-num">01</div>
      <article class="card">
        <h2>问题定义</h2>
        <p>说明输入条件、载荷、边界和工程约束。</p>
        <div class="note">结论先行：先告诉读者这一步为什么重要。</div>
      </article>
    </section>
  </main>
</body>
</html>
