<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johnson Engineering Landing</title>
  <style>
    :root {
      --color-primary: #1E3A8A;
      --color-secondary: #10B981;
      --color-accent: #F97316;
      --color-highlight: #FACC15;
      --color-ink: #333333;
      --color-bg: #FEFCF6;
      --color-card: #FFFFFF;
      --color-border: #E5E7EB;
      --color-primary-soft: #EFF6FF;
      --color-secondary-soft: #ECFDF5;
      --color-highlight-soft: #FFFBEB;
      --color-accent-soft: #FFF7ED;
      --blue: var(--color-primary);
      --yellow: var(--color-highlight);
      --red: var(--color-accent);
      --green: var(--color-secondary);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans SC", "PingFang SC", sans-serif; background: var(--color-bg); color: var(--color-ink); line-height: 1.7; }
    .page { overflow: hidden; }
    .container { width: min(1120px, calc(100% - 40px)); margin: 0 auto; }
    .hero { min-height: 88vh; display: grid; grid-template-columns: 1.05fr .95fr; align-items: center; gap: clamp(32px, 5vw, 72px); padding: 72px 0; }
    .eyebrow { color: var(--color-secondary); font-weight: 800; letter-spacing: .12em; text-transform: uppercase; font-size: .78rem; }
    h1 { margin-top: 16px; color: var(--color-primary); font-size: clamp(2.8rem, 7vw, 5.8rem); line-height: .98; letter-spacing: -.05em; }
    .lead { margin-top: 24px; font-size: clamp(1.05rem, 2vw, 1.3rem); max-width: 620px; }
    .actions { margin-top: 32px; display: flex; flex-wrap: wrap; gap: 14px; }
    .btn-primary, .btn-accent, .btn-warning { display: inline-flex; align-items: center; justify-content: center; min-height: 46px; padding: 0 22px; border-radius: 999px; font-weight: 800; text-decoration: none; }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-accent { background: var(--color-highlight); color: var(--color-primary); }
    .btn-warning { background: var(--color-accent); color: white; }
    .hero-card { position: relative; padding: 22px; background: var(--color-highlight); border-radius: 32px; border: 2px solid rgba(30,58,138,.15); box-shadow: 0 24px 80px rgba(30,58,138,.16); transform: rotate(1.5deg); }
    .hero-card img { width: 100%; display: block; border-radius: 24px; background: white; }
    .section { padding: clamp(68px, 10vw, 120px) 0; }
    .section-title { color: var(--color-primary); font-size: clamp(2rem, 4vw, 3.4rem); line-height: 1.08; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .card { background: var(--color-card); border: 1px solid var(--color-border); border-radius: 20px; padding: 24px; box-shadow: 0 12px 36px rgba(30,58,138,.06); }
    .card img { width: 86px; height: 86px; object-fit: contain; margin-bottom: 18px; }
    .card h3 { color: var(--color-primary); font-size: 1.2rem; margin-bottom: 8px; }
    .tag-fea, .tag-vibration, .tag-code { color: var(--color-primary); background: var(--color-primary-soft); }
    .tag-fatigue { color: var(--color-accent); background: var(--color-accent-soft); }
    .tag-durability, .tag-ai { color: var(--color-secondary); background: var(--color-secondary-soft); }
    .tag { display: inline-flex; border-radius: 999px; padding: 4px 10px; font-size: .78rem; font-weight: 800; margin-bottom: 12px; }
    @media (max-width: 860px) { .hero, .grid { grid-template-columns: 1fr; } .hero { min-height: auto; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero container">
      <div>
        <p class="eyebrow">Johnson Engineering Design System</p>
        <h1>Engineering with Simulation for a Better Future</h1>
        <p class="lead">用有限元、疲劳、振动、耐久、代码和 AI 辅助分析，把复杂工程问题讲清楚、算明白、交付稳。</p>
        <div class="actions">
          <a class="btn-primary" href="#capabilities">查看工程能力</a>
          <a class="btn-accent" href="#workflow">了解分析流程</a>
        </div>
      </div>
      <figure class="hero-card">
        <img src="banner-engineering.png" alt="Johnson Engineering Banner">
      </figure>
    </section>
    <section id="capabilities" class="section container">
      <h2 class="section-title">核心工程能力</h2>
      <div class="grid">
        <article class="card"><span class="tag tag-fea">FEA</span><img src="stickers/sticker-fea.png" alt="FEA"><h3>有限元仿真</h3><p>结构建模、应力云图、载荷边界、结果校核。</p></article>
        <article class="card"><span class="tag tag-fatigue">Fatigue</span><img src="stickers/sticker-fatigue.png" alt="Fatigue"><h3>疲劳分析</h3><p>S-N 曲线、损伤累积、寿命预测和风险提示。</p></article>
        <article class="card"><span class="tag tag-vibration">Vibration</span><img src="stickers/sticker-vibration.png" alt="Vibration"><h3>振动分析</h3><p>频谱、模态、响应和工程解释。</p></article>
      </div>
    </section>
  </main>
</body>
</html>
