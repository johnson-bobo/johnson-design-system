<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johnson Engineering Cards</title>
<style>
:root {
  --color-primary: #1E3A8A;
  --color-secondary: #10B981;
  --color-accent: #F97316;
  --color-highlight: #FACC15;
  --color-ink: #333333;
  --color-bg: #FEFCF6;
  --color-card: #FFFFFF;
  --color-border: #E5E7EB;
  --color-primary-soft: #EFF6FF;
  --color-secondary-soft: #ECFDF5;
  --color-highlight-soft: #FFFBEB;
  --color-accent-soft: #FFF7ED;
  --blue: var(--color-primary);
  --yellow: var(--color-highlight);
  --red: var(--color-accent);
  --green: var(--color-secondary);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #ececec; color: var(--color-ink); font-family: "Noto Sans SC", "PingFang SC", sans-serif; }
.stage { display: grid; gap: 36px; place-items: center; padding: 36px; }
.card-page { width: 1080px; height: 1440px; position: relative; overflow: hidden; background: var(--color-bg); border: 28px solid var(--color-highlight); border-radius: 40px; padding: 76px; box-shadow: 0 20px 80px rgba(30,58,138,.18); }
.cover { background: linear-gradient(145deg, var(--color-highlight-soft), var(--color-bg)); }
.cover h1 { color: var(--color-primary); font-size: 88px; line-height: 1.06; letter-spacing: -4px; max-width: 780px; }
.highlight { background: var(--color-highlight); border-radius: 18px; padding: 0 18px; }
.avatar { position: absolute; right: 76px; top: 76px; width: 140px; height: 140px; border-radius: 50%; border: 6px solid var(--color-primary); background: white; object-fit: cover; }
.sticker { position: absolute; width: 230px; height: 230px; object-fit: contain; right: 96px; bottom: 170px; transform: rotate(5deg); }
.author { position: absolute; left: 76px; bottom: 76px; color: var(--color-primary); font-size: 40px; font-weight: 900; }
.subtitle { margin-top: 28px; font-size: 42px; line-height: 1.35; max-width: 720px; }
.content h2 { color: var(--color-primary); font-size: 62px; line-height: 1.12; margin-bottom: 42px; }
.knowledge-card { background: var(--color-card); border: 2px solid var(--color-border); border-radius: 32px; padding: 44px; margin-top: 34px; }
.knowledge-card p { font-size: 38px; line-height: 1.55; }
.badge { display: inline-flex; padding: 10px 20px; border-radius: 999px; background: var(--color-primary-soft); color: var(--color-primary); font-size: 28px; font-weight: 900; margin-bottom: 28px; }
.footer-strip { position: absolute; left: 76px; right: 76px; bottom: 58px; height: 16px; border-radius: 999px; background: linear-gradient(90deg, var(--color-primary), var(--color-secondary), var(--color-highlight), var(--color-accent)); }
@media (max-width: 900px) { .stage { transform: scale(.34); transform-origin: top center; width: 1080px; } }
</style>
</head>
<body>
  <main class="stage">
    <section class="card-page cover">
      <img class="avatar" src="avatar.jpg" alt="Johnson Avatar">
      <h1>工程问题，先把<span class="highlight">边界条件</span>讲清楚</h1>
      <p class="subtitle">FEA / Fatigue / Vibration / Durability / Code / AI</p>
      <img class="sticker" src="stickers/sticker-fea.png" alt="FEA Sticker">
      <p class="author">Johnson · Simulation Engineer</p>
    </section>
    <section class="card-page content">
      <span class="badge">Engineering Note</span>
      <h2>一页只讲一个判断</h2>
      <div class="knowledge-card">
        <p>把输入、方法、结果和风险拆开写。读者不需要猜你的分析逻辑，工程结论会更可信。</p>
      </div>
      <div class="footer-strip"></div>
    </section>
  </main>
</body>
</html>
